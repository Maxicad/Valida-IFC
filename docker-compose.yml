services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-valida_ifc}
      POSTGRES_USER: ${POSTGRES_USER:-valida_ifc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valida_ifc}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - valida_ifc_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./infra/storage:/data/storage
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env.example
    volumes:
      - ./infra/storage:/data/storage
    depends_on:
      - redis

volumes:
  valida_ifc_postgres:
