name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r apps/api/requirements.txt
      - run: python -m pytest apps/api/tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/api:${{ github.workspace }}/packages/rules-engine:${{ github.workspace }}/packages/ifc-utils

  e2e:
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -r apps/api/requirements.txt
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          CI: "true"
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/apps/api:${{ github.workspace }}/packages/rules-engine:${{ github.workspace }}/packages/ifc-utils
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-evidence
          path: |
            test-results/e2e
            playwright-report
